# Routine 01 — Premarket Analyst (cloud, GitHub Actions)
# Orario in UTC. 12:30 UTC = 14:30 CEST (ora legale). In ora solare (da fine ottobre)
# corrisponde alle 13:30 CET: vedi nota DST in docs/02_implementation_notes.md.
name: routine-01-premarket

on:
  schedule:
    - cron: '30 12 * * 1-5'
  workflow_dispatch: {}        # permette il lancio manuale dalla tab Actions

permissions:
  contents: write              # serve per ricommittare lo stato nel repo

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - name: Configura identità git
        run: |
          git config user.name "trading-bot[bot]"
          git config user.email "trading-bot@users.noreply.github.com"
      - name: Esegui Routine 01
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
        run: python -m lib.routine_01_premarket
