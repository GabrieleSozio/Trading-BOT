# Routine 06 — Supervisore AI (cloud). Sabato 08:00 UTC = 10:00 CEST.
# Gira a mercati chiusi (dopo il flat di venerdì), così la performance è "pulita".
# L'AI può modificare SOLO i parametri in whitelist (config: supervisor.tunable),
# mai le guardrail. Senza ANTHROPIC_API_KEY non fa nulla.
name: routine-06-supervisor

on:
  schedule:
    - cron: '0 8 * * 6'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - name: Configura identità git
        run: |
          git config user.name "trading-bot[bot]"
          git config user.email "trading-bot@users.noreply.github.com"
      - name: Esegui Supervisore AI
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python -m lib.routine_06_supervisor
